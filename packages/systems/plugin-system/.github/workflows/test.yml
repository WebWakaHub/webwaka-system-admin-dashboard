name: Test

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Generate coverage report
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Archive coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 30
      
      - name: Check coverage thresholds
        run: |
          echo "Checking coverage thresholds..."
          npm run test:coverage -- --passWithNoTests
          
          # Extract coverage percentages
          STATEMENTS=$(cat coverage/coverage-summary.json | jq '.total.statements.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq '.total.branches.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq '.total.functions.pct')
          LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          
          echo "Coverage Summary:"
          echo "  Statements: $STATEMENTS%"
          echo "  Branches: $BRANCHES%"
          echo "  Functions: $FUNCTIONS%"
          echo "  Lines: $LINES%"
          
          # Check thresholds (88% statements, 80% branches, 85% functions, 88% lines)
          if (( $(echo "$STATEMENTS < 88" | bc -l) )); then
            echo "❌ Statements coverage ($STATEMENTS%) is below threshold (88%)"
            exit 1
          fi
          
          if (( $(echo "$BRANCHES < 80" | bc -l) )); then
            echo "❌ Branches coverage ($BRANCHES%) is below threshold (80%)"
            exit 1
          fi
          
          if (( $(echo "$FUNCTIONS < 85" | bc -l) )); then
            echo "❌ Functions coverage ($FUNCTIONS%) is below threshold (85%)"
            exit 1
          fi
          
          if (( $(echo "$LINES < 88" | bc -l) )); then
            echo "❌ Lines coverage ($LINES%) is below threshold (88%)"
            exit 1
          fi
          
          echo "✅ All coverage thresholds met!"
